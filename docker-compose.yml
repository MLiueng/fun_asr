services:
  fun-asr:
    build:
      context: .
      dockerfile: Dockerfile
    image: fun-asr-server:latest
    container_name: fun-asr-server
    ports:
      - "${PORT:-9000}:9000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODELSCOPE_CACHE=/app/models
      - MODELSCOPE_MODULES_CACHE=/app/models

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]
    volumes:
      # 模型缓存持久化到宿主机，避免每次重建容器重新下载
      - ./models:/app/models
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9000"
      - "--device"
      - "cuda:0"
      # 启动时预加载模型
      - "--preload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
